<!doctype html>
<!--
  emergence machine · visualization · 3D differential growth + flythrough
  Same scored timeline; tree now grows in 3D space (each node has x,y,z and
  a unit direction vector). Lines drawn as a single WebGL LineSegments with
  per-vertex colour for ember-to-paper aging. A pre-composed camera path
  visits different regions of the tree over the song; at every section
  boundary the camera pulls back briefly then dives in.
  Uses Three.js via ES module CDN — no build step.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>emergence · tree · 3d · audio</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #0a0907;
    --paper:      #e8e1d4;
    --paper-dim:  #948876;
    --ember:      #c9844a;
    --slate:      #6b8a8f;
    --rule:       rgba(232, 225, 212, 0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--ink); color: var(--paper); font-family: 'Cormorant Garamond', serif; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: block; background: var(--ink); }
  .hud { position: fixed; font-family: 'JetBrains Mono', monospace; font-weight: 300; font-size: 10px; letter-spacing: 0.24em; text-transform: lowercase; color: var(--paper-dim); pointer-events: none; user-select: none; }
  .hud.tl { top: 28px; left: 32px; }
  .hud.br { bottom: 28px; right: 32px; }
  .hud .v { color: var(--paper); }
  .hud .row { display: flex; align-items: center; gap: 8px; }
  .dot { width: 5px; height: 5px; border: 1px solid var(--rule); display: inline-block; transition: background-color 80ms ease, border-color 80ms ease; }
  .dot.lit { background: var(--paper); border-color: var(--paper); }
  .dot.lit.kick { background: var(--ember); border-color: var(--ember); }
  .timeline { position: fixed; left: 5%; right: 5%; bottom: 16px; height: 1px; background: var(--rule); pointer-events: none; }
  .timeline > i { position: absolute; top: -2px; width: 1px; height: 5px; background: var(--paper); left: 0%; }
  #entry { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 28px; background: radial-gradient(ellipse at center, rgba(10,9,7,0.55) 0%, rgba(10,9,7,0.92) 70%); z-index: 10; transition: opacity 1s ease, visibility 1s ease; }
  #entry.gone { opacity: 0; visibility: hidden; }
  #entry .title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: 36px; color: var(--paper); text-align: center; max-width: 32ch; line-height: 1.2; }
  #entry .sub { font-family: 'JetBrains Mono', monospace; font-weight: 300; font-size: 11px; color: var(--paper-dim); letter-spacing: 0.32em; text-transform: lowercase; text-align: center; max-width: 60ch; }
  #entry .play { display: inline-block; cursor: pointer; padding: 14px 26px; border: 1px solid var(--rule); color: var(--paper); font-family: 'JetBrains Mono', monospace; font-weight: 300; font-size: 11px; letter-spacing: 0.32em; text-transform: lowercase; background: transparent; }
  #entry .play:hover { border-color: var(--paper); color: var(--ember); }
  #entry input[type=file] { display: none; }
  #entry .hint { font-family: 'JetBrains Mono', monospace; font-weight: 300; font-size: 9px; letter-spacing: 0.32em; color: var(--paper-dim); text-transform: lowercase; opacity: 0.7; text-align: center; }
</style>
<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js"
  }
}
</script>
</head>

<canvas id="stage"></canvas>

<div class="hud tl">

  <div class="row"><span class="dot" id="dBass"></span> <span>bass · branch</span></div>
  <div class="row"><span class="dot" id="dSnare"></span> <span>snare · side-branch</span></div>
  <div class="row"><span class="dot" id="dPerc"></span> <span>perc · twig</span></div>

  <div style="margin-top:10px;"><span class="v" id="hudNodes">0</span> nodes</div>
  <div><span id="hudTime">0:00</span> &nbsp; <span class="v" id="hudSection">—</span></div>
  <div><span id="hudCam">cam —</span></div>
</div>
<div class="hud br"><span class="v" id="hudFps">—</span></div>

<div class="timeline"><i id="timelineCursor"></i></div>

<div id="entry">
  <div class="title">tree · 3d · flythrough</div>
  <div class="sub">composed camera path visits different regions of the growing tree</div>
  <input id="picker" type="file" accept="audio/*">
  <label class="play" for="picker">load audio</label>
  <div class="hint" id="loadStatus">timeline embedded · click to play</div>
</div>

<script type="module">
import * as THREE from 'three';

/* ============================================================
   1. renderer / scene / camera
   ============================================================ */
const canvas = document.getElementById('stage');
const renderer = new THREE.WebGLRenderer({ canvas, antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio || 1, 2));

const scene = new THREE.Scene();
scene.background = new THREE.Color(0x0a0907);
// distance fog so far lines fade into the ink — gives depth
scene.fog = new THREE.Fog(0x0a0907, 180, 700);

const camera = new THREE.PerspectiveCamera(58, window.innerWidth / window.innerHeight, 1, 5000);
camera.position.set(0, 60, 320);
camera.lookAt(0, 0, 0);

function resize() {
  renderer.setSize(window.innerWidth, window.innerHeight);
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
}
window.addEventListener('resize', resize);
resize();

/* ============================================================
   2. score (inline / fetch fallback)
   ============================================================ */
let score = null;
const cursors = {};
function applyScore(data) {
  score = data;
  for (const band in data.events) cursors[band] = 0;
  document.getElementById('loadStatus').textContent =
    'timeline loaded · ' + Object.values(data.events).reduce((s, e) => s + e.length, 0) +
    ' events · ' + data.duration.toFixed(1) + 's · click to play';
}
if (window.__SCORE) applyScore(window.__SCORE);
else fetch('track_events.json').then(r => r.json()).then(applyScore).catch(() => {
  document.getElementById('loadStatus').textContent = 'no timeline (degraded)';
});

/* ============================================================
   3. audio
   ============================================================ */
const audioEl = document.getElementById('audioEl');
let audioReady = false;
document.getElementById('picker').addEventListener('change', (e) => {
  const f = e.target.files && e.target.files[0]; if (!f) return;
  audioEl.src = URL.createObjectURL(f);
  audioEl.loop = true;
  audioEl.play().then(() => {
    audioReady = true;
    document.getElementById('entry').classList.add('gone');
    resetGrowth();
    for (const band in cursors) cursors[band] = 0;
    nextSection = 1;
  }).catch(err => console.warn(err));
});

/* ============================================================
   4. 3D growth substrate
   ============================================================ */
const MAX_NODES = 4000;
const nx = new Float32Array(MAX_NODES);
const ny = new Float32Array(MAX_NODES);
const nz = new Float32Array(MAX_NODES);
const ndx = new Float32Array(MAX_NODES);
const ndy = new Float32Array(MAX_NODES);
const ndz = new Float32Array(MAX_NODES);
const nParent = new Int32Array(MAX_NODES);
const nDepth = new Int16Array(MAX_NODES);
const nBand = new Uint8Array(MAX_NODES);
const nAge = new Float32Array(MAX_NODES);
// Each node gets an anamorphic target (X,Y) from the logo. The Z stays at
// the node's natural growth depth so from non-reveal angles the tree still
// has 3D structure. When the camera locks on -Z at end of song, the X/Y
// projections form the logo silhouette.
const NODE_LOGO_X = new Float32Array(MAX_NODES);
const NODE_LOGO_Y = new Float32Array(MAX_NODES);
let logoTargets = null;
if (window.__LOGO) logoTargets = window.__LOGO;
else fetch('logo_targets.json').then(r => r.json()).then(d => { logoTargets = d; }).catch(() => {});
let nodeCount = 0;
let tips = [];

// Per-band growth probabilities (event → growth action chance)
const GROWTH_PROB = { kick: 0.18, bass: 0.22, snare: 0.95, perc: 0.16, hat: 0.18 };
const STEP        = { kick: 8.0,  bass: 6.0,  snare: 10.0, perc: 3.5, hat: 2.5 };

const BOUND_R = 220;   // world-space bound — tree fits in this radius
function inBounds(x, y, z) {
  return (x*x + y*y + z*z) < (BOUND_R * BOUND_R);
}

function randomUnitDirection() {
  const phi = Math.random() * Math.PI * 2;
  const cosTheta = Math.random() * 2 - 1;
  const sinTheta = Math.sqrt(1 - cosTheta * cosTheta);
  return [sinTheta * Math.cos(phi), sinTheta * Math.sin(phi), cosTheta];
}

function addNode(x, y, z, parent, depth, dx, dy, dz, band) {
  if (nodeCount >= MAX_NODES) return -1;
  const i = nodeCount++;
  nx[i] = x; ny[i] = y; nz[i] = z;
  ndx[i] = dx; ndy[i] = dy; ndz[i] = dz;
  nParent[i] = parent;
  nDepth[i] = depth;
  nBand[i] = band;
  nAge[i] = 0;
  // Assign an anamorphic logo target. Children pick a target near their
  // parent's target so connecting lines stay within the logo silhouette
  // when the camera locks on the reveal angle.
  if (logoTargets && logoTargets.length > 0) {
    if (parent >= 0) {
      const pTx = NODE_LOGO_X[parent] / BOUND_R;
      const pTy = -NODE_LOGO_Y[parent] / BOUND_R;
      let bestD = Infinity, bestT = logoTargets[0];
      // sample 8 random targets, pick the nearest to parent's target
      for (let k = 0; k < 8; k++) {
        const t = logoTargets[(Math.random() * logoTargets.length) | 0];
        const dx_ = t[0] - pTx, dy_ = t[1] - pTy;
        const d = dx_ * dx_ + dy_ * dy_;
        if (d < bestD) { bestD = d; bestT = t; }
      }
      NODE_LOGO_X[i] = bestT[0] * BOUND_R;
      NODE_LOGO_Y[i] = -bestT[1] * BOUND_R;   // flip Y from image to world
    } else {
      // root or initial tip — random target
      const t = logoTargets[(Math.random() * logoTargets.length) | 0];
      NODE_LOGO_X[i] = t[0] * BOUND_R;
      NODE_LOGO_Y[i] = -t[1] * BOUND_R;
    }
  } else {
    NODE_LOGO_X[i] = x;
    NODE_LOGO_Y[i] = y;
  }
  return i;
}

function resetGrowth() {
  nodeCount = 0;
  tips.length = 0;
  // Root at origin
  addNode(0, 0, 0, -1, 0, 0, 0, 0, 0);
  // 16 initial tips on a sphere shell
  for (let i = 0; i < 16; i++) {
    const d = randomUnitDirection();
    const r = 4;
    const idx = addNode(d[0] * r, d[1] * r, d[2] * r, 0, 1, d[0], d[1], d[2], 0);
    tips.push(idx);
  }
}

/* Build an orthonormal frame around direction d, then perturb d by an angle
   in a random direction within that frame's perpendicular plane. */
function perturbDirection(dx, dy, dz, maxAngle) {
  // pick arbitrary up not parallel
  let upx, upy, upz;
  if (Math.abs(dy) < 0.9) { upx = 0; upy = 1; upz = 0; }
  else                    { upx = 1; upy = 0; upz = 0; }
  // perp1 = up × d ; perp2 = d × perp1
  let p1x = upy * dz - upz * dy;
  let p1y = upz * dx - upx * dz;
  let p1z = upx * dy - upy * dx;
  const p1L = Math.hypot(p1x, p1y, p1z) || 1;
  p1x /= p1L; p1y /= p1L; p1z /= p1L;
  const p2x = dy * p1z - dz * p1y;
  const p2y = dz * p1x - dx * p1z;
  const p2z = dx * p1y - dy * p1x;
  const a = (Math.random() - 0.5) * 2 * maxAngle;
  const phi = Math.random() * Math.PI * 2;
  const t = Math.sin(a), c = Math.cos(a);
  const tx = Math.cos(phi) * p1x + Math.sin(phi) * p2x;
  const ty = Math.cos(phi) * p1y + Math.sin(phi) * p2y;
  const tz = Math.cos(phi) * p1z + Math.sin(phi) * p2z;
  let rx = dx * c + tx * t;
  let ry = dy * c + ty * t;
  let rz = dz * c + tz * t;
  const L = Math.hypot(rx, ry, rz) || 1;
  return [rx / L, ry / L, rz / L];
}

// Slight outward bias from origin (decongests inner volume)
function biasOutward(x, y, z, dx, dy, dz, strength) {
  const r = Math.hypot(x, y, z) || 1;
  const rx = x / r, ry = y / r, rz = z / r;
  // lerp direction toward radial
  const nx_ = dx * (1 - strength) + rx * strength;
  const ny_ = dy * (1 - strength) + ry * strength;
  const nz_ = dz * (1 - strength) + rz * strength;
  const L = Math.hypot(nx_, ny_, nz_) || 1;
  return [nx_ / L, ny_ / L, nz_ / L];
}

function extendTip(tipIdx, stepLen, angleVariation, band) {
  if (tipIdx < 0 || tipIdx >= nodeCount) return false;
  const r0 = Math.hypot(nx[tipIdx], ny[tipIdx], nz[tipIdx]);
  const outwardBias = 0.45 * Math.max(0, 1 - r0 / (BOUND_R * 0.75));
  const stepBoost = 1 + (r0 < BOUND_R * 0.25 ? 1.5 : 0);
  let [dx, dy, dz] = perturbDirection(ndx[tipIdx], ndy[tipIdx], ndz[tipIdx], angleVariation);
  [dx, dy, dz] = biasOutward(nx[tipIdx], ny[tipIdx], nz[tipIdx], dx, dy, dz, outwardBias);
  const newX = nx[tipIdx] + dx * stepLen * stepBoost;
  const newY = ny[tipIdx] + dy * stepLen * stepBoost;
  const newZ = nz[tipIdx] + dz * stepLen * stepBoost;
  if (!inBounds(newX, newY, newZ)) return false;
  const newIdx = addNode(newX, newY, newZ, tipIdx, nDepth[tipIdx] + 1, dx, dy, dz, band);
  if (newIdx < 0) return false;
  const pos = tips.indexOf(tipIdx);
  if (pos >= 0) tips[pos] = newIdx;
  return true;
}

function branchTip(tipIdx, branchAngle, stepLen, band) {
  if (tipIdx < 0 || tipIdx >= nodeCount) return false;
  const r0 = Math.hypot(nx[tipIdx], ny[tipIdx], nz[tipIdx]);
  const outwardBias = 0.35 * Math.max(0, 1 - r0 / (BOUND_R * 0.75));
  const stepBoost = 1 + (r0 < BOUND_R * 0.25 ? 1.3 : 0);
  let any = false;
  for (let s = 0; s < 2; s++) {
    let [dx, dy, dz] = perturbDirection(ndx[tipIdx], ndy[tipIdx], ndz[tipIdx], branchAngle);
    [dx, dy, dz] = biasOutward(nx[tipIdx], ny[tipIdx], nz[tipIdx], dx, dy, dz, outwardBias);
    const newX = nx[tipIdx] + dx * stepLen * stepBoost;
    const newY = ny[tipIdx] + dy * stepLen * stepBoost;
    const newZ = nz[tipIdx] + dz * stepLen * stepBoost;
    if (!inBounds(newX, newY, newZ)) continue;
    const newIdx = addNode(newX, newY, newZ, tipIdx, nDepth[tipIdx] + 1, dx, dy, dz, band);
    if (newIdx >= 0) { tips.push(newIdx); any = true; }
  }
  if (any) {
    const pos = tips.indexOf(tipIdx);
    if (pos >= 0) tips.splice(pos, 1);
  }
  return any;
}

function sideBranch(parentIdx, stepLen, band) {
  if (parentIdx < 0 || parentIdx >= nodeCount) return false;
  let [dx, dy, dz] = perturbDirection(ndx[parentIdx], ndy[parentIdx], ndz[parentIdx], 1.0);
  // strong outward bias for side branches
  [dx, dy, dz] = biasOutward(nx[parentIdx], ny[parentIdx], nz[parentIdx], dx, dy, dz, 0.4);
  const newX = nx[parentIdx] + dx * stepLen;
  const newY = ny[parentIdx] + dy * stepLen;
  const newZ = nz[parentIdx] + dz * stepLen;
  if (!inBounds(newX, newY, newZ)) return false;
  const newIdx = addNode(newX, newY, newZ, parentIdx, nDepth[parentIdx] + 1, dx, dy, dz, band);
  if (newIdx >= 0) tips.push(newIdx);
  return true;
}

/* ============================================================
   5. event drain + section boundary explosion (3D)
   ============================================================ */
const last = { sub:-999, kick:-999, bass:-999, low_mid:-999, snare:-999, perc:-999, hat:-999 };
let nextSection = 1;
let explosionUntil = -999;
let cameraShake = 0;

function explosion() {
  explosionUntil = performance.now() + 2200;
  cameraShake = 1.0;
  const tipCount = tips.length;
  const newTips = [];
  for (let i = 0; i < tipCount; i++) {
    const tip = tips[i];
    if (tip < 0 || tip >= nodeCount) continue;
    const r = Math.hypot(nx[tip], ny[tip], nz[tip]) || 1;
    const rx = nx[tip] / r, ry = ny[tip] / r, rz = nz[tip] / r;
    const jump = BOUND_R * (0.12 + Math.random() * 0.10);
    const tgtX = nx[tip] + rx * jump;
    const tgtY = ny[tip] + ry * jump;
    const tgtZ = nz[tip] + rz * jump;
    if (!inBounds(tgtX, tgtY, tgtZ)) { newTips.push(tip); continue; }
    const newIdx = addNode(tgtX, tgtY, tgtZ, tip, nDepth[tip] + 1, rx, ry, rz, 2);
    if (newIdx < 0) { newTips.push(tip); continue; }
    newTips.push(newIdx);
    // 2 extra side sprouts
    if (Math.random() < 0.75) {
      for (let s = 0; s < 2; s++) {
        let [dx, dy, dz] = perturbDirection(rx, ry, rz, 0.55);
        const sStep = BOUND_R * (0.06 + Math.random() * 0.05);
        const sx = nx[tip] + dx * sStep;
        const sy = ny[tip] + dy * sStep;
        const sz = nz[tip] + dz * sStep;
        if (!inBounds(sx, sy, sz)) continue;
        const sIdx = addNode(sx, sy, sz, tip, nDepth[tip] + 1, dx, dy, dz, 2);
        if (sIdx >= 0) newTips.push(sIdx);
      }
    }
  }
  tips = newTips;
}

function applyEvent(band, strength) {
  const boost = (performance.now() < explosionUntil) ? 2.2 : 1.0;
  if (Math.random() > (GROWTH_PROB[band] || 0) * boost) return;
  if (tips.length === 0) return;
  if (band === 'kick') {
    const tip = tips[(Math.random() * tips.length) | 0];
    extendTip(tip, STEP.kick + strength * 4, 0.3, 1);
  } else if (band === 'bass') {
    const tip = tips[(Math.random() * tips.length) | 0];
    branchTip(tip, 0.42 + Math.random() * 0.15, STEP.bass + strength * 3, 2);
  } else if (band === 'snare') {
    if (nodeCount > 16) {
      const parent = 16 + ((Math.random() * (nodeCount - 16)) | 0);
      sideBranch(parent, STEP.snare + strength * 4, 3);
    }
  } else if (band === 'perc') {
    const recent = Math.max(16, nodeCount - 100);
    const parent = recent + ((Math.random() * (nodeCount - recent)) | 0);
    sideBranch(parent, STEP.perc, 4);
  } else if (band === 'hat') {
    const tip = tips[(Math.random() * tips.length) | 0];
    extendTip(tip, STEP.hat, 0.55, 5);
  }
}

function drainEvents(t) {
  if (!score) return;
  if (audioEl.currentTime < (cursors.__last_t || 0) - 0.5) {
    for (const band in score.events) {
      cursors[band] = 0;
      const list = score.events[band];
      while (cursors[band] < list.length && list[cursors[band]][0] < t) cursors[band]++;
    }
    nextSection = 1;
    const secs = score.sections || [];
    while (nextSection < secs.length && secs[nextSection] < t) nextSection++;
  }
  for (const band in score.events) {
    const list = score.events[band];
    let c = cursors[band];
    while (c < list.length && list[c][0] <= t) {
      const strength = list[c][1];
      last[band] = performance.now();
      const visBand = (band === 'low_mid') ? 'snare' : band;
      if (GROWTH_PROB[visBand] !== undefined) applyEvent(visBand, strength);
      c++;
    }
    cursors[band] = c;
  }
  const secs = score.sections || [];
  while (nextSection < secs.length && secs[nextSection] <= t) {
    explosion();
    nextSection++;
  }
  cursors.__last_t = audioEl.currentTime;
}

/* ============================================================
   6. line geometry — single LineSegments for the whole tree
   ============================================================ */
const linePositions = new Float32Array(MAX_NODES * 6);   // 2 verts × 3 coords per segment
const lineColors    = new Float32Array(MAX_NODES * 6);
const lineGeom = new THREE.BufferGeometry();
lineGeom.setAttribute('position', new THREE.BufferAttribute(linePositions, 3));
lineGeom.setAttribute('color',    new THREE.BufferAttribute(lineColors, 3));
lineGeom.setDrawRange(0, 0);
const lineMat = new THREE.LineBasicMaterial({
  vertexColors: true, transparent: true, opacity: 0.85, fog: true
});
const lines = new THREE.LineSegments(lineGeom, lineMat);
scene.add(lines);

// Tip dots — small sprites
const tipGeom = new THREE.BufferGeometry();
const tipPositions = new Float32Array(MAX_NODES * 3);
tipGeom.setAttribute('position', new THREE.BufferAttribute(tipPositions, 3));
const tipMat = new THREE.PointsMaterial({ color: 0xc9844a, size: 4, sizeAttenuation: true, transparent: true, opacity: 0.85, fog: true });
const tipPoints = new THREE.Points(tipGeom, tipMat);
scene.add(tipPoints);

// Ember halo for explosion — sphere mesh that pulses
const haloGeom = new THREE.SphereGeometry(1, 24, 16);
const haloMat = new THREE.MeshBasicMaterial({ color: 0xc9844a, transparent: true, opacity: 0, wireframe: true, fog: true });
const halo = new THREE.Mesh(haloGeom, haloMat);
scene.add(halo);

function updateGeometry() {
  // ANAMORPHIC MORPH — only takes effect in the final reveal window.
  // Before LOGO_START: positions are the organic ones. After: lerp toward
  // logo (X,Y) target while keeping Z. Only the reveal-angle camera sees
  // this as the logo silhouette; other angles still see organic 3D depth.
  const progress = (audioReady && score && score.duration > 0)
                    ? Math.min(1, audioEl.currentTime / score.duration) : 0;
  const LOGO_START = 0.92;
  let logoBlend = 0;
  if (logoTargets && progress > LOGO_START) {
    const u = (progress - LOGO_START) / (1 - LOGO_START);
    logoBlend = u * u * (3 - 2 * u);    // smoothstep
  }

  // Rewrite all line segments + colours each frame. With MAX_NODES = 4000
  // segments this is well under 100k float writes — trivial.
  let v = 0;
  let segCount = 0;
  for (let i = 1; i < nodeCount; i++) {
    const p = nParent[i];
    if (p < 0) continue;
    // Displaced positions — lerp organic → logo target on (X, Y)
    const px_ = nx[p] * (1 - logoBlend) + NODE_LOGO_X[p] * logoBlend;
    const py_ = ny[p] * (1 - logoBlend) + NODE_LOGO_Y[p] * logoBlend;
    const ix_ = nx[i] * (1 - logoBlend) + NODE_LOGO_X[i] * logoBlend;
    const iy_ = ny[i] * (1 - logoBlend) + NODE_LOGO_Y[i] * logoBlend;
    linePositions[v]     = px_; linePositions[v + 1] = py_; linePositions[v + 2] = nz[p];
    linePositions[v + 3] = ix_; linePositions[v + 4] = iy_; linePositions[v + 5] = nz[i];
    // age → ember fade
    nAge[i] += 1;
    const recent = Math.max(0, 1 - nAge[i] / 90);
    let r, g, b;
    if (recent > 0.02) {
      // lerp ember(0.79, 0.52, 0.29) ↔ paper(0.91, 0.88, 0.83)
      r = 0.79 * recent + 0.91 * (1 - recent);
      g = 0.52 * recent + 0.88 * (1 - recent);
      b = 0.29 * recent + 0.83 * (1 - recent);
    } else {
      // depth-tinted: trunks paper, twigs paper-dim
      const depthShade = Math.max(0, 1 - nDepth[i] * 0.05);
      r = 0.58 + depthShade * 0.33;
      g = 0.53 + depthShade * 0.35;
      b = 0.46 + depthShade * 0.37;
    }
    lineColors[v]     = r; lineColors[v + 1] = g; lineColors[v + 2] = b;
    lineColors[v + 3] = r; lineColors[v + 4] = g; lineColors[v + 5] = b;
    v += 6;
    segCount++;
  }
  lineGeom.attributes.position.needsUpdate = true;
  lineGeom.attributes.color.needsUpdate = true;
  lineGeom.setDrawRange(0, segCount * 2);
  // tips — also morph toward logo when blend is active
  let tv = 0;
  for (let t = 0; t < tips.length; t++) {
    const i = tips[t];
    if (i < 0 || i >= nodeCount) continue;
    tipPositions[tv]     = nx[i] * (1 - logoBlend) + NODE_LOGO_X[i] * logoBlend;
    tipPositions[tv + 1] = ny[i] * (1 - logoBlend) + NODE_LOGO_Y[i] * logoBlend;
    tipPositions[tv + 2] = nz[i];
    tv += 3;
  }
  tipGeom.attributes.position.needsUpdate = true;
  tipGeom.setDrawRange(0, tv / 3);
}

/* ============================================================
   7. camera flythrough — composed waypoint sequence
   ============================================================
   Each waypoint: { u: 0..1 along song, pos: V3, look: V3 }
   We linear-interp between waypoints. Section boundaries get a
   "pull back" then "dive in" via tight adjacent waypoints.
   ============================================================ */
const wp = [
  { u: 0.00, pos: [   0,   80,  340], look: [ 0,  0,  0] },   // establishing
  { u: 0.12, pos: [ 180,   60,  240], look: [ 0,  0,  0] },
  { u: 0.22, pos: [ 220,    0,    0], look: [ 0,  0,  0] },   // side angle
  { u: 0.34, pos: [ 100, -120,  120], look: [ 0,  0,  0] },   // up from below
  // bass drop at 0.38 (sections[1] = 83 / 219)
  { u: 0.37, pos: [   0,    0,  500], look: [ 0,  0,  0] },   // PULL BACK
  { u: 0.40, pos: [   0,   30,   90], look: [ 0,  0,  0] },   // DIVE IN
  { u: 0.50, pos: [-180,   60,  120], look: [ 0,  0,  0] },
  { u: 0.62, pos: [-150,  150, -100], look: [ 0,  0,  0] },
  { u: 0.72, pos: [   0,  280,    0], look: [ 0,  0,  0] },   // top-down
  { u: 0.82, pos: [ 250,   80, -150], look: [ 0,  0,  0] },
  { u: 0.88, pos: [  80,   60,  280], look: [ 0,  0,  0] },   // turning toward reveal
  // REVEAL — lock on -Z viewing axis so the X/Y projection forms the logo
  { u: 0.94, pos: [   0,    0,  460], look: [ 0,  0,  0] },   // far reveal
  { u: 1.00, pos: [   0,    0,  380], look: [ 0,  0,  0] }    // final logo shot
];

function interpCamera(u) {
  // find surrounding waypoints
  let i = 0;
  while (i < wp.length - 1 && wp[i + 1].u < u) i++;
  const a = wp[i], b = wp[Math.min(i + 1, wp.length - 1)];
  const tt = (b.u === a.u) ? 0 : (u - a.u) / (b.u - a.u);
  // smoothstep for slightly easier motion
  const t = tt * tt * (3 - 2 * tt);
  const px = a.pos[0] + (b.pos[0] - a.pos[0]) * t;
  const py = a.pos[1] + (b.pos[1] - a.pos[1]) * t;
  const pz = a.pos[2] + (b.pos[2] - a.pos[2]) * t;
  const lx = a.look[0] + (b.look[0] - a.look[0]) * t;
  const ly = a.look[1] + (b.look[1] - a.look[1]) * t;
  const lz = a.look[2] + (b.look[2] - a.look[2]) * t;
  return { px, py, pz, lx, ly, lz };
}

/* ============================================================
   8. render loop
   ============================================================ */
let frame = 0;
let lastTime = performance.now();
let fpsEMA = 60;

const dKick  = document.getElementById('dKick');
const dBass  = document.getElementById('dBass');
const dSnare = document.getElementById('dSnare');
const dPerc  = document.getElementById('dPerc');
const dHat   = document.getElementById('dHat');
const hudNodes = document.getElementById('hudNodes');
const hudTime  = document.getElementById('hudTime');
const hudSec   = document.getElementById('hudSection');
const hudFps   = document.getElementById('hudFps');
const hudCam   = document.getElementById('hudCam');
const tlc      = document.getElementById('timelineCursor');

function formatTime(t) {
  const m = Math.floor(t / 60);
  const s = Math.floor(t - m * 60);
  return m + ':' + (s < 10 ? '0' : '') + s;
}

if (nodeCount === 0) resetGrowth();

function tick(now) {
  const dt = now - lastTime; lastTime = now;
  fpsEMA = fpsEMA * 0.92 + (1000 / Math.max(dt, 1)) * 0.08;

  if (nodeCount === 0) resetGrowth();
  if (audioReady && score) drainEvents(audioEl.currentTime);

  updateGeometry();

  // Camera
  const u = (audioReady && score) ? Math.min(1, audioEl.currentTime / score.duration) : 0;
  const c = interpCamera(u);
  // shake the camera briefly after a drop
  const shake = cameraShake;
  cameraShake *= 0.92;
  const shx = (Math.random() - 0.5) * shake * 4;
  const shy = (Math.random() - 0.5) * shake * 4;
  const shz = (Math.random() - 0.5) * shake * 4;
  camera.position.set(c.px + shx, c.py + shy, c.pz + shz);
  camera.lookAt(c.lx, c.ly, c.lz);

  // halo
  if (performance.now() < explosionUntil) {
    const fadeT = (explosionUntil - performance.now()) / 2200;
    halo.scale.setScalar(BOUND_R * (0.05 + (1 - fadeT) * 0.95));
    haloMat.opacity = Math.min(0.85, fadeT * 1.4) * 0.5;
  } else {
    haloMat.opacity = 0;
  }

  renderer.render(scene, camera);

  if ((frame & 3) === 0) {
    const N = performance.now();
    dKick.classList.toggle('lit',  N - last.kick  < 80);
    dBass.classList.toggle('lit',  N - last.bass  < 90);
    dSnare.classList.toggle('lit', N - last.snare < 200);
    dPerc.classList.toggle('lit',  N - last.perc  < 80);
    dHat.classList.toggle('lit',   N - last.hat   < 80);
    hudNodes.textContent = nodeCount.toString();
    hudFps.textContent   = fpsEMA.toFixed(0) + 'fps';
    if (audioReady && score) {
      const t = audioEl.currentTime;
      hudTime.textContent = formatTime(t);
      hudSec.textContent = (t < 83 ? 'intro' : t < 209 ? 'main' : 'outro');
      tlc.style.left = (t / score.duration * 100).toFixed(2) + '%';
      hudCam.textContent =
        'cam ' + c.px.toFixed(0) + ',' + c.py.toFixed(0) + ',' + c.pz.toFixed(0);
    }
  }
  frame++;
  requestAnimationFrame(tick);
}
requestAnimationFrame(tick);

window.addEventListener('keydown', (e) => {
  if (e.key === 'r' || e.key === 'R') resetGrowth();
  if (e.code === 'Space' && audioReady) {
    if (audioEl.paused) audioEl.play(); else audioEl.pause();
    e.preventDefault();
  }
});
</script>
