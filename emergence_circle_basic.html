<!doctype html>
<!--
  emergence machine · visualization · basic
  Just a circle. Bass drives its radius. Mid drives its rim weight.
  Treble drives a faint outer halo. Nothing else — this is the
  ground-truth check that the audio pipeline reaches the screen.
-->
<html lang="en">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width,initial-scale=1">
<title>emergence · circle · basic</title>
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Cormorant+Garamond:ital,wght@0,300;0,400;0,500;1,400&family=JetBrains+Mono:wght@300;400&display=swap" rel="stylesheet">
<style>
  :root {
    --ink:        #0a0907;
    --paper:      #e8e1d4;
    --paper-dim:  #948876;
    --ember:      #c9844a;
    --slate:      #6b8a8f;
    --rule:       rgba(232, 225, 212, 0.12);
  }
  * { box-sizing: border-box; }
  html, body { margin: 0; padding: 0; height: 100%; background: var(--ink); color: var(--paper); font-family: 'Cormorant Garamond', serif; overflow: hidden; }
  #stage { position: fixed; inset: 0; display: block; background: var(--ink); }

  .hud { position: fixed; font-family: 'JetBrains Mono', monospace; font-weight: 300; font-size: 10px; letter-spacing: 0.24em; text-transform: lowercase; color: var(--paper-dim); pointer-events: none; user-select: none; }
  .hud.tl { top: 28px; left: 32px; }
  .hud.br { bottom: 28px; right: 32px; }
  .hud .v { color: var(--paper); }

  #entry { position: fixed; inset: 0; display: flex; align-items: center; justify-content: center; flex-direction: column; gap: 28px; background: radial-gradient(ellipse at center, rgba(10,9,7,0.55) 0%, rgba(10,9,7,0.92) 70%); z-index: 10; transition: opacity 1s ease, visibility 1s ease; }
  #entry.gone { opacity: 0; visibility: hidden; }
  #entry .title { font-family: 'Cormorant Garamond', serif; font-weight: 300; font-style: italic; font-size: 36px; color: var(--paper); text-align: center; }
  #entry label.pick { display: inline-block; cursor: pointer; padding: 14px 26px; border: 1px solid var(--rule); color: var(--paper); font-family: 'JetBrains Mono', monospace; font-weight: 300; font-size: 11px; letter-spacing: 0.32em; text-transform: lowercase; }
  #entry label.pick:hover { border-color: var(--paper); color: var(--ember); }
  #entry input[type=file] { display: none; }
  #entry .hint { font-family: 'JetBrains Mono', monospace; font-weight: 300; font-size: 9px; letter-spacing: 0.32em; color: var(--paper-dim); text-transform: lowercase; opacity: 0.7; text-align: center; }
</style>
</head>
<body>

<canvas id="stage"></canvas>

<div class="hud tl">
  <div>circle · basic</div>
  <div style="margin-top:10px;">bass &nbsp; <span class="v" id="hudBass">0.00</span></div>
  <div>mid &nbsp; <span class="v" id="hudMid">0.00</span></div>
  <div>treble &nbsp; <span class="v" id="hudTrb">0.00</span></div>
</div>
<div class="hud br">
  <div><span class="v" id="hudFps">—</span></div>
</div>

<div id="entry">
  <div class="title">load the wav.</div>
  <label class="pick" for="picker">load audio</label>
  <input id="picker" type="file" accept="audio/*">
  <div class="hint">click above, then pick the .wav</div>
</div>

<audio id="audioEl" loop crossorigin="anonymous"></audio>

<script>
(() => {
  'use strict';

  const canvas = document.getElementById('stage');
  const ctx = canvas.getContext('2d');
  let W = 0, H = 0;
  const DPR = Math.min(window.devicePixelRatio || 1, 2);

  function resize() {
    W = Math.floor(window.innerWidth  * DPR);
    H = Math.floor(window.innerHeight * DPR);
    canvas.width = W; canvas.height = H;
    canvas.style.width = window.innerWidth + 'px';
    canvas.style.height = window.innerHeight + 'px';
  }
  window.addEventListener('resize', resize);
  resize();

  // ---- audio ----
  const audioEl = document.getElementById('audioEl');
  let actx = null, analyser = null, freqBuf = null;
  let audioReady = false;

  function ensureCtx() {
    if (actx) return;
    actx = new (window.AudioContext || window.webkitAudioContext)();
    const src = actx.createMediaElementSource(audioEl);
    analyser = actx.createAnalyser();
    analyser.fftSize = 2048;
    analyser.smoothingTimeConstant = 0.02;     // near-zero → transients survive to modes
    src.connect(analyser);
    analyser.connect(actx.destination);
    freqBuf = new Uint8Array(analyser.frequencyBinCount);
  }

  const picker = document.getElementById('picker');
  picker.addEventListener('change', (e) => {
    const f = e.target.files && e.target.files[0];
    if (!f) return;
    audioEl.src = URL.createObjectURL(f);
    audioEl.loop = true;
    ensureCtx();
    audioEl.play().then(() => {
      audioReady = true;
      document.getElementById('entry').classList.add('gone');
    }).catch(err => console.warn('play() rejected:', err));
  });

  // ---- analysis: 3 band averages + N angular modes for rim ripple ----
  let bass = 0, mid = 0, treble = 0;   // smoothed
  // Angular mode amplitudes. Each mode k makes the rim oscillate with k lobes.
  // Modes are log-frequency-mapped: mode 1-2 → bass, 3-6 → mid, 7-18 → treble.
  const NUM_MODES = 28;
  const modeAmp   = new Float32Array(NUM_MODES + 1);   // [1..NUM_MODES]
  const modePhase = new Float32Array(NUM_MODES + 1);
  const modeDrift = new Float32Array(NUM_MODES + 1);   // per-mode phase advance per frame
  const modeFreqHz = new Float32Array(NUM_MODES + 1);

  // log-distribute mode frequencies from 30 Hz to 12 kHz
  (function initModes() {
    const fMin = 30, fMax = 12000;
    const logMin = Math.log(fMin), logMax = Math.log(fMax);
    for (let k = 1; k <= NUM_MODES; k++) {
      const t = (k - 0.5) / NUM_MODES;
      modeFreqHz[k] = Math.exp(logMin + t * (logMax - logMin));
      // higher modes drift faster — feels alive
      modeDrift[k]  = 0.005 + (k / NUM_MODES) * 0.055;
      modePhase[k]  = Math.random() * Math.PI * 2;
    }
  })();

  function readAudio() {
    if (!audioReady) {
      const t = performance.now() * 0.001;
      bass   = 0.30 + 0.25 * (0.5 + 0.5 * Math.sin(t * 1.3));    // synthetic carrier
      mid    = 0.20 + 0.20 * (0.5 + 0.5 * Math.sin(t * 0.7 + 1));
      treble = 0.18 + 0.18 * (0.5 + 0.5 * Math.sin(t * 2.1));
      // synthetic mode amps so the rim breathes even without audio
      for (let k = 1; k <= NUM_MODES; k++) {
        const ph = t * (0.6 + k * 0.18) + k;
        const target = 0.15 + 0.20 * Math.abs(Math.sin(ph));
        modeAmp[k] = modeAmp[k] * 0.7 + target * 0.3;
        modePhase[k] += modeDrift[k];
      }
      return;
    }
    analyser.getByteFrequencyData(freqBuf);
    const nbin = freqBuf.length;
    const hzPerBin = (actx.sampleRate * 0.5) / nbin;

    // Three band averages for the existing bass/mid/treble globals
    let sB = 0, cB = 0, sM = 0, cM = 0, sT = 0, cT = 0;
    for (let i = 1; i < nbin; i++) {
      const hz = i * hzPerBin;
      const a = Math.sqrt(freqBuf[i] / 255);
      if (hz < 30) continue;
      if (hz < 200)        { sB += a; cB++; }
      else if (hz < 2000)  { sM += a; cM++; }
      else if (hz < 12000) { sT += a; cT++; }
    }
    const tB = cB ? sB / cB : 0;
    const tM = cM ? sM / cM : 0;
    const tT = cT ? sT / cT : 0;
    bass   = bass   * 0.55 + tB * 0.45;
    mid    = mid    * 0.65 + tM * 0.35;
    treble = treble * 0.65 + tT * 0.35;

    // Per-mode amplitude: peak amplitude in a small bin range around the mode's frequency.
    // NO IIR smoothing here — modes snap instantly to the current FFT so transients
    // (kicks, hats, percs) hit the rim on the frame they happen.
    for (let k = 1; k <= NUM_MODES; k++) {
      const f = modeFreqHz[k];
      const fLo = f / 1.08, fHi = f * 1.08;       // narrow band per mode
      let bLo = Math.max(1, Math.floor(fLo / hzPerBin));
      let bHi = Math.min(nbin - 1, Math.ceil(fHi / hzPerBin));
      if (bHi <= bLo) bHi = bLo + 1;
      let maxA = 0;
      for (let b = bLo; b < bHi; b++) {
        const a = freqBuf[b];
        if (a > maxA) maxA = a;
      }
      const target = Math.sqrt(maxA / 255);
      // higher modes get much more visual weight so fine ripples read jagged
      const weight = 0.40 + Math.pow(k / NUM_MODES, 0.55) * 1.80;
      modeAmp[k]   = target * weight;            // direct, no IIR
      modePhase[k] += modeDrift[k];
    }
  }

  // ---- render loop ----
  let frame = 0;
  let lastTime = performance.now();
  let fpsEMA = 60;

  const hudBass = document.getElementById('hudBass');
  const hudMid  = document.getElementById('hudMid');
  const hudTrb  = document.getElementById('hudTrb');
  const hudFps  = document.getElementById('hudFps');

  function tick(now) {
    const dt = now - lastTime;
    lastTime = now;
    fpsEMA = fpsEMA * 0.92 + (1000 / Math.max(dt, 1)) * 0.08;

    readAudio();

    // background — full clear with ink
    ctx.fillStyle = '#0a0907';
    ctx.fillRect(0, 0, W, H);

    const cx = W * 0.5;
    const cy = H * 0.5;
    const baseR = Math.min(W, H) * 0.18;       // base radius
    const r = baseR * (1 + bass * 1.10);       // pumped by bass (0..~110% growth)
    const rim = 2 * DPR + mid * 14 * DPR;      // rim line weight grows with mid

    // halo — driven by treble, drawn first so the disc sits on top
    const haloR = r + 40 * DPR + treble * 80 * DPR;
    const grad = ctx.createRadialGradient(cx, cy, r * 0.6, cx, cy, haloR);
    grad.addColorStop(0, 'rgba(201, 132, 74, ' + (0.18 + treble * 0.35).toFixed(3) + ')');
    grad.addColorStop(0.5, 'rgba(201, 132, 74, ' + (0.05 + treble * 0.10).toFixed(3) + ')');
    grad.addColorStop(1, 'rgba(10, 9, 7, 0)');
    ctx.fillStyle = grad;
    ctx.beginPath();
    ctx.arc(cx, cy, haloR, 0, Math.PI * 2);
    ctx.fill();

    // ---- rim path with angular wave-modes (the "smaller vibrations") ----
    // r(θ) = r * (1 + Σ_k amp_k * shape(k·θ + φ_k))
    // shape() is sharper than sin so peaks become spiky tooth-shapes — gives
    // the jagged "shimmer" feel rather than smooth wobble.
    const SEG = 480;
    const dTheta = (Math.PI * 2) / SEG;
    const modeScale = 0.055;

    // mildly sharper than sin: sgn(sin) · |sin|^0.85 — a touch of spike but not jagged
    function shape(x) {
      const s = Math.sin(x);
      const a = s < 0 ? -s : s;
      const m = Math.pow(a, 0.85);
      return s < 0 ? -m : m;
    }

    const rimPoints = new Float32Array(SEG * 2);
    let pIdx = 0;
    for (let s = 0; s < SEG; s++) {
      const theta = s * dTheta;
      let dr = 0;
      for (let k = 1; k <= NUM_MODES; k++) {
        dr += modeAmp[k] * shape(k * theta + modePhase[k]);
      }
      const rr = r * (1 + dr * modeScale);
      rimPoints[pIdx++] = cx + Math.cos(theta) * rr;
      rimPoints[pIdx++] = cy + Math.sin(theta) * rr;
    }

    // disc fill — same polyline so the body breathes with the rim
    ctx.beginPath();
    ctx.moveTo(rimPoints[0], rimPoints[1]);
    for (let s = 1; s < SEG; s++) ctx.lineTo(rimPoints[s * 2], rimPoints[s * 2 + 1]);
    ctx.closePath();
    ctx.fillStyle = 'rgba(148, 136, 118, ' + (0.10 + bass * 0.35).toFixed(3) + ')';
    ctx.fill();

    // rim stroke — paper, weight pumped by mid
    ctx.beginPath();
    ctx.moveTo(rimPoints[0], rimPoints[1]);
    for (let s = 1; s < SEG; s++) ctx.lineTo(rimPoints[s * 2], rimPoints[s * 2 + 1]);
    ctx.closePath();
    ctx.lineWidth = rim;
    ctx.strokeStyle = 'rgb(232, 225, 212)';
    ctx.stroke();

    // inner concentric ring — also gets the rim modes, at smaller radius and
    // dimmer; this makes the smaller wiggles visible in two places.
    const innerR = r * (0.45 + mid * 0.15);
    ctx.beginPath();
    for (let s = 0; s < SEG; s++) {
      const theta = s * dTheta;
      let dr = 0;
      for (let k = 1; k <= NUM_MODES; k++) {
        dr += modeAmp[k] * shape(k * theta + modePhase[k]);
      }
      const rr = innerR * (1 + dr * modeScale * 0.7);
      const x = cx + Math.cos(theta) * rr;
      const y = cy + Math.sin(theta) * rr;
      if (s === 0) ctx.moveTo(x, y); else ctx.lineTo(x, y);
    }
    ctx.closePath();
    ctx.lineWidth = 1 * DPR;
    ctx.strokeStyle = 'rgba(232, 225, 212, ' + (0.20 + mid * 0.60).toFixed(3) + ')';
    ctx.stroke();

    // HUD update (every 4 frames)
    if ((frame & 3) === 0) {
      hudBass.textContent = bass.toFixed(2);
      hudMid.textContent  = mid.toFixed(2);
      hudTrb.textContent  = treble.toFixed(2);
      hudFps.textContent  = fpsEMA.toFixed(0) + 'fps';
    }
    if (frame === 0 || frame === 120 || frame % 600 === 0) {
      console.log('[circle] frame=' + frame + ' fps=' + fpsEMA.toFixed(0) +
                  ' bass=' + bass.toFixed(2) + ' audioReady=' + audioReady);
    }
    frame++;
    requestAnimationFrame(tick);
  }
  requestAnimationFrame(tick);

})();
</script>
</body>
</html>
